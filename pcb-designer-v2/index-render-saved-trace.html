<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>PCB Designer</title>
<style>
body { margin: 0; overflow: hidden; }
#ui { position: absolute; top: 10px; left: 10px; color: white; }
</style>
</head>
<body>
<div id="ui">Click to route. Double-click to finish trace.</div>
<script type="module">
import * as THREE from "https://esm.sh/three@0.160.0?bundle";
import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";
/* === SCENE SETUP === */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 100, 100);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
scene.add(light);
/* === PCB BOARD === */
class PCBBoard {
  constructor(w = 80, h = 60, t = 1.6) {
    const geo = new THREE.BoxGeometry(w, t, h);
    const mat = new THREE.MeshStandardMaterial({ color: 0x0f6a2f });
    this.mesh = new THREE.Mesh(geo, mat);
    this.mesh.position.y = t / 2;
  }
}
const pcb = new PCBBoard();
scene.add(pcb.mesh);
/* === STATE MODEL (NEW) === */
class Trace {
  constructor(points, layer = "top", width = 0.6) {
    this.points = points.map(p => p.clone());
    this.layer = layer;
    this.width = width;
  }
}
class PCBState {
  constructor() {
    this.traces = [];
    this.layers = [
      { name: "top", z: 0.8 },
      { name: "bottom", z: -0.8 }
    ];
  }
  addTrace(trace) {
    this.traces.push(trace);
  }
}
const pcbState = new PCBState();
/* === LAYER GROUPS (NEW) === */
const layerGroups = {};
pcbState.layers.forEach(layer => {
  const g = new THREE.Group();
  g.position.y = layer.z;
  scene.add(g);
  layerGroups[layer.name] = g;
});
/* === ROUTING ENGINE (FIXED) === */
class RoutingEngine {
  constructor(scene) {
    this.scene = scene;
    this.points = [];
    this.isRouting = false;
    this.mode = "manhattan";
    this.group = new THREE.Group();
    this.scene.add(this.group);
    this.width = 0.6;
    this.material = new THREE.MeshStandardMaterial({
      color: 0xffaa00,
      emissive: 0xff6600,
      emissiveIntensity: 0.3
    });
  }
  handleClick(point) {
    if (!this.isRouting) {
      this.start(point);
      this.isRouting = true;
    } else {
      this.addPoint(point);
    }
  }
  handleMove(point) {
    if (!this.isRouting) return;
    this.updateCursor(point);
  }
  handleFinish() {
    if (!this.isRouting) return null;
    const result = [...this.points];
    this.clear();
    this.isRouting = false;
    return result;
  }
  start(p) {
    this.points = [p.clone()];
    this.redraw([]);
  }
  addPoint(p) {
    this.points.push(p.clone());
  }
  updateCursor(cursor) {
    if (this.points.length === 0) return;
    const last = this.points[this.points.length - 1];
    const corner = new THREE.Vector3(cursor.x, last.y, last.z);
    const preview = [...this.points, corner, cursor.clone()];
    this.redraw(preview);
  }
  clear() {
    this.group.clear();
    this.points = [];
  }
  redraw(points) {
    this.group.clear();
    for (let i = 0; i < points.length - 1; i++) {
      const a = points[i];
      const b = points[i + 1];
      this.group.add(this.createSegment(a, b));
    }
  }
  createSegment(a, b) {
    const len = a.distanceTo(b);
    const geo = new THREE.BoxGeometry(this.width, 0.05, len);
    const mesh = new THREE.Mesh(geo, this.material);
    const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
    mesh.position.copy(mid);
    mesh.lookAt(b);
    mesh.rotateX(Math.PI / 2);
    return mesh;
  }
}
const router = new RoutingEngine(scene);
/* === RENDER SAVED TRACE (NEW) === */
function renderTrace(trace) {
  const group = layerGroups[trace.layer];
  for (let i = 0; i < trace.points.length - 1; i++) {
    const a = trace.points[i];
    const b = trace.points[i + 1];
    const len = a.distanceTo(b);
    const geo = new THREE.BoxGeometry(trace.width, 0.05, len);
    const mat = new THREE.MeshStandardMaterial({ color: 0xffa000 });
    const mesh = new THREE.Mesh(geo, mat);
    const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
    mesh.position.copy(mid);
    mesh.lookAt(b);
    mesh.rotateX(Math.PI / 2);
    group.add(mesh);
  }
}
/* === INPUT === */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
function getMousePoint(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const p = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, p);
  return snap(p);
}
function snap(v, g = 1) {
  v.x = Math.round(v.x / g) * g;
  v.z = Math.round(v.z / g) * g;
  return v;
}
/* === EVENTS === */
window.addEventListener("mousedown", e => {
  const p = getMousePoint(e);
  router.handleClick(p);
});
window.addEventListener("mousemove", e => {
  const p = getMousePoint(e);
  router.handleMove(p);
});
window.addEventListener("dblclick", () => {
  const pts = router.handleFinish();
  if (!pts || pts.length < 2) return;
  const trace = new Trace(pts, "top", 0.6);
  pcbState.addTrace(trace);
  renderTrace(trace);
});
/* === LOOP === */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
