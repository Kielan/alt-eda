<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>TFT LCD Pixel/Subpixel Electrical Simulator</title>
<style>
  body { margin:0; overflow:hidden; background:#111; color:#0f0; font-family:monospace;}
  #panel {
    position:absolute; right:0; top:0; width:360px; height:100%;
    background:#000d; padding:10px; overflow:auto; border-left:1px solid #0f0;
  }
  button, select { width:100%; margin:6px 0; padding:6px; }
  canvas { display:block; }
</style>
</head>
<body>
<div id="panel">
  <button id="toggleView">Toggle Exploded / Assembled</button>
  <button id="toggleTouch">Toggle Touch Overlay</button>
  <select id="mode">
    <option value="IPS">IPS Mode</option>
    <option value="TN">TN Mode</option>
  </select>

  <h3>Signal Inspector</h3>
  <div id="signals"></div>

  <h3>Column Voltage Waveform</h3>
  <canvas id="wave" width="320" height="120"></canvas>
</div>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.161.0';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,8,18);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 1.5));

// ---------- LCD LAYERS ----------
const layers = [];
function layer(color, name, opacity=0.3){
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(12,8,0.08),
    new THREE.MeshStandardMaterial({color, transparent:true, opacity})
  );
  m.userData.name = name;
  scene.add(m);
  layers.push(m);
}
layer(0x00ffff,"Touch",0.2);
layer(0xffffff,"Top Polarizer",0.15);
layer(0xff0000,"RGB Filter",0.35);
layer(0x8888ff,"Liquid Crystal",0.3);
layer(0xffff00,"TFT Glass",0.4);
layer(0xffffff,"Rear Polarizer",0.15);
layer(0xffffff,"Backlight",0.15);

let exploded=true;
function positionLayers(){
  layers.forEach((l,i)=>l.position.y = exploded? i*0.5 : 0);
}
positionLayers();
toggleView.onclick=()=>{exploded=!exploded;positionLayers();};

// ---------- PIXEL GRID ----------
const GRID_W=80, GRID_H=60; // scaled from 800x600
const pixelGroup=new THREE.Group();
scene.add(pixelGroup);

const pxSize=0.12;
const pixels=[];
for(let y=0;y<GRID_H;y++){
  for(let x=0;x<GRID_W;x++){
    const geo=new THREE.BoxGeometry(pxSize,pxSize,0.02);
    const mat=new THREE.MeshBasicMaterial({color:0x000000});
    const m=new THREE.Mesh(geo,mat);
    m.position.set(
      (x-GRID_W/2)*pxSize*1.1,
      (y-GRID_H/2)*pxSize*1.1,
      0.3
    );
    pixelGroup.add(m);
    pixels.push(m);
  }
}

// ---------- TOUCH GRID ----------
let touchOn=false;
const touchGrid=new THREE.GridHelper(10,20,0x00ffff,0x00ffff);
touchGrid.position.z=0.6;
scene.add(touchGrid);
touchGrid.visible=false;
toggleTouch.onclick=()=>{touchOn=!touchOn;touchGrid.visible=touchOn;};

// ---------- SIGNAL SIM ----------
let row=0,col=0,frame=0,vcom=1;
const WIDTH=800,HEIGHT=600;
const FPS=60;

const signalDiv=document.getElementById("signals");

function updateSignals(dt){
  col++;
  if(col>=WIDTH){col=0;row++;}
  if(row>=HEIGHT){row=0;frame++; vcom*=-1;}

  const PCLK=col%2;
  const HSYNC=col===0;
  const VSYNC=row===0&&col===0;
  const DE=true;

  signalDiv.innerHTML=`
  Frame: ${frame}<br>
  Row: ${row}<br>
  Column: ${col}<br>
  Vcom: ${vcom}<br><br>
  PCLK: ${PCLK}<br>
  HSYNC: ${HSYNC}<br>
  VSYNC: ${VSYNC}<br>
  DE: ${DE}
  `;

  renderPixels();
  plotWave(col/ WIDTH);
}

// ---------- PIXEL ELECTRICAL MODEL ----------
const modeSel=document.getElementById("mode");

function renderPixels(){
  const mode=modeSel.value;
  for(let i=0;i<pixels.length;i++){
    const y=Math.floor(i/GRID_W);
    const x=i%GRID_W;

    const voltage=((x+y+frame)%10)/10;
    let brightness = voltage;

    if(mode==="TN") brightness*=0.7;
    if(vcom<0) brightness=1-brightness;

    pixels[i].material.color.setRGB(
      brightness,
      (x%3===1)?brightness:0,
      (x%3===2)?brightness:0
    );
  }
}

// ---------- WAVEFORM ----------
const wave=document.getElementById("wave");
const ctx=wave.getContext("2d");
function plotWave(v){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,wave.width,wave.height);
  ctx.strokeStyle="#0f0";
  ctx.beginPath();
  for(let x=0;x<wave.width;x++){
    const y=Math.sin((x/wave.width+v)*Math.PI*2)*40+60;
    ctx.lineTo(x,y);
  }
  ctx.stroke();
}

// ---------- ANIMATE ----------
function animate(){
  requestAnimationFrame(animate);
  updateSignals(0.016);
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
