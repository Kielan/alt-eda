<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>ThreeJS Face Selection Demo</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#1e1e1e;
    font-family:Arial;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    gap:10px;
    z-index:10;
}

button{
    background:#2f2f2f;
    color:white;
    border:1px solid #555;
    padding:10px 14px;
    cursor:pointer;
}

button:hover{
    background:#444;
}

#info{
    position:absolute;
    bottom:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:8px;
    border-radius:4px;
}

</style>
</head>

<body>

<div id="ui">
    <button id="topBtn">Top View</button>
    <button id="frontBtn">Front View</button>
    <button id="rightBtn">Right View</button>
</div>

<div id="info">
    Left Click Object Faces To Select
</div>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.180.0/build/three.module.js';

////////////////////////////////////////////////////////////////////////////////
// Scene
////////////////////////////////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

////////////////////////////////////////////////////////////////////////////////
// Camera
////////////////////////////////////////////////////////////////////////////////

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(8,6,8);

////////////////////////////////////////////////////////////////////////////////
// Renderer
////////////////////////////////////////////////////////////////////////////////

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

////////////////////////////////////////////////////////////////////////////////
// Lights
////////////////////////////////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff,1.0);
dirLight.position.set(10,10,10);
scene.add(dirLight);

////////////////////////////////////////////////////////////////////////////////
// Helpers
////////////////////////////////////////////////////////////////////////////////

scene.add(new THREE.GridHelper(20,20));
scene.add(new THREE.AxesHelper(5));

////////////////////////////////////////////////////////////////////////////////
// Materials
////////////////////////////////////////////////////////////////////////////////

const cubeMat = new THREE.MeshStandardMaterial({
    color:0x4da6ff,
    flatShading:true
});

const cylMat = new THREE.MeshStandardMaterial({
    color:0xff884d,
    flatShading:true
});

////////////////////////////////////////////////////////////////////////////////
// Cube
////////////////////////////////////////////////////////////////////////////////

const cube = new THREE.Mesh(
    new THREE.BoxGeometry(2,2,2),
    cubeMat
);

cube.position.set(0,1,0);

scene.add(cube);

////////////////////////////////////////////////////////////////////////////////
// Cylinder
////////////////////////////////////////////////////////////////////////////////

const cylinder = new THREE.Mesh(
    new THREE.CylinderGeometry(1,1,2,24),
    cylMat
);

cylinder.position.set(5,1,0);

scene.add(cylinder);

////////////////////////////////////////////////////////////////////////////////
// Edge Wireframes
////////////////////////////////////////////////////////////////////////////////

function addEdges(mesh){

    const edges = new THREE.EdgesGeometry(mesh.geometry);

    const line = new THREE.LineSegments(
        edges,
        new THREE.LineBasicMaterial({
            color:0x000000
        })
    );

    mesh.add(line);
}

addEdges(cube);
addEdges(cylinder);

////////////////////////////////////////////////////////////////////////////////
// Face Highlight Mesh
////////////////////////////////////////////////////////////////////////////////

const highlightMaterial = new THREE.MeshBasicMaterial({
    color:0xffff00,
    side:THREE.DoubleSide,
    transparent:true,
    opacity:0.65,
    depthTest:false
});

let faceHighlight = null;

////////////////////////////////////////////////////////////////////////////////
// Select State
////////////////////////////////////////////////////////////////////////////////

let selectedObject = cube;

////////////////////////////////////////////////////////////////////////////////
// Raycaster
////////////////////////////////////////////////////////////////////////////////

const raycaster = new THREE.Raycaster();

const mouse = new THREE.Vector2();

const selectable = [cube,cylinder];

////////////////////////////////////////////////////////////////////////////////
// Selection Visuals
////////////////////////////////////////////////////////////////////////////////

function updateObjectSelection(){

    cube.material.emissive.setHex(0x000000);
    cylinder.material.emissive.setHex(0x000000);

    if(selectedObject){
        selectedObject.material.emissive.setHex(0x222222);
    }
}

updateObjectSelection();

////////////////////////////////////////////////////////////////////////////////
// Face Highlight Creation
////////////////////////////////////////////////////////////////////////////////

function createFaceHighlight(intersection){

    if(faceHighlight){
        scene.remove(faceHighlight);
        faceHighlight.geometry.dispose();
    }

    const mesh = intersection.object;
    const geometry = mesh.geometry;

    const posAttr = geometry.attributes.position;

    const faceIndex = intersection.faceIndex;

    const index = geometry.index;

    let a,b,c;

    if(index){

        a = index.array[faceIndex * 3 + 0];
        b = index.array[faceIndex * 3 + 1];
        c = index.array[faceIndex * 3 + 2];

    }else{

        a = faceIndex * 3 + 0;
        b = faceIndex * 3 + 1;
        c = faceIndex * 3 + 2;
    }

    const vertices = [];

    const va = new THREE.Vector3().fromBufferAttribute(posAttr,a);
    const vb = new THREE.Vector3().fromBufferAttribute(posAttr,b);
    const vc = new THREE.Vector3().fromBufferAttribute(posAttr,c);

    mesh.localToWorld(va);
    mesh.localToWorld(vb);
    mesh.localToWorld(vc);

    vertices.push(
        va.x,va.y,va.z,
        vb.x,vb.y,vb.z,
        vc.x,vc.y,vc.z
    );

    const highlightGeo = new THREE.BufferGeometry();

    highlightGeo.setAttribute(
        'position',
        new THREE.Float32BufferAttribute(vertices,3)
    );

    highlightGeo.computeVertexNormals();

    faceHighlight = new THREE.Mesh(
        highlightGeo,
        highlightMaterial
    );

    scene.add(faceHighlight);
}

////////////////////////////////////////////////////////////////////////////////
// leftMouseBtnSelect()
////////////////////////////////////////////////////////////////////////////////

function leftMouseBtnSelect(event){

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse,camera);

    const hits = raycaster.intersectObjects(selectable,false);

    if(hits.length > 0){

        const hit = hits[0];

        selectedObject = hit.object;

        updateObjectSelection();

        createFaceHighlight(hit);

        console.log(
            "Selected Face:",
            hit.faceIndex,
            "Object:",
            selectedObject.uuid
        );
    }
}

window.addEventListener('pointerdown',(event)=>{

    if(event.button === 0){
        leftMouseBtnSelect(event);
    }

});

////////////////////////////////////////////////////////////////////////////////
// Camera Focus
////////////////////////////////////////////////////////////////////////////////

function focusCamera(direction){

    if(!selectedObject) return;

    const target = selectedObject.position.clone();

    const offset = direction.clone()
        .normalize()
        .multiplyScalar(10);

    camera.position.copy(target).add(offset);

    camera.lookAt(target);
}

////////////////////////////////////////////////////////////////////////////////
// View Buttons
////////////////////////////////////////////////////////////////////////////////

function setTopView(){

    camera.up.set(0,0,-1);

    focusCamera(new THREE.Vector3(0,1,0));
}

function setFrontView(){

    camera.up.set(0,1,0);

    focusCamera(new THREE.Vector3(0,0,1));
}

function setRightView(){

    camera.up.set(0,1,0);

    focusCamera(new THREE.Vector3(1,0,0));
}

document
.getElementById('topBtn')
.addEventListener('click',setTopView);

document
.getElementById('frontBtn')
.addEventListener('click',setFrontView);

document
.getElementById('rightBtn')
.addEventListener('click',setRightView);

////////////////////////////////////////////////////////////////////////////////
// Resize
////////////////////////////////////////////////////////////////////////////////

window.addEventListener('resize',()=>{

    camera.aspect = window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

////////////////////////////////////////////////////////////////////////////////
// Animate
////////////////////////////////////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(animate);

    renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
