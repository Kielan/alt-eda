<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Advanced Bicycle Flywheel CAD Simulator</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#080808;
    font-family:Arial,sans-serif;
    color:white;
}

#app{
    width:100vw;
    height:100vh;
    display:flex;
}

#leftPanel{
    width:280px;
    min-width:280px;
    background:#151515;
    border-right:1px solid #333;
    overflow-y:auto;
    padding:12px;
    box-sizing:border-box;
}

#rightPanel{
    width:320px;
    min-width:320px;
    background:#151515;
    border-left:1px solid #333;
    overflow-y:auto;
    padding:12px;
    box-sizing:border-box;
}

#viewport{
    flex:1;
    position:relative;
    overflow:hidden;
}

button{
    width:100%;
    margin-bottom:8px;
    padding:10px;
    background:#262626;
    border:1px solid #555;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#363636;
}

.panelTitle{
    color:#8ff;
    font-size:18px;
    margin-bottom:12px;
    font-weight:bold;
}

.toggleGroup{
    margin-bottom:16px;
}

.toggleGroup label{
    display:block;
    margin-bottom:8px;
    cursor:pointer;
}

#info{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.7);
    padding:10px;
    z-index:5;
    font-size:13px;
}

#nodeGraph{
    position:absolute;
    bottom:10px;
    left:10px;
    width:420px;
    height:220px;
    background:rgba(20,20,20,0.95);
    border:1px solid #444;
}

.node{
    position:absolute;
    width:120px;
    height:50px;
    background:#222;
    border:1px solid #666;
    border-radius:6px;
    padding:6px;
    box-sizing:border-box;
    user-select:none;
    cursor:move;
}
</style>
</head>

<body>

<div id="app">

    <div id="leftPanel">

        <div class="panelTitle">
            Mechanical Systems
        </div>

        <button id="toggleSimBtn">
            Toggle Simulation
        </button>

        <div class="toggleGroup">

            <label><input type="checkbox" id="toggleFrame" checked> Frame</label>
            <label><input type="checkbox" id="toggleWheels" checked> Wheels</label>
            <label><input type="checkbox" id="toggleChain" checked> Chain</label>
            <label><input type="checkbox" id="toggleFlywheel" checked> Flywheel + Gears</label>
            <label><input type="checkbox" id="toggleFork" checked> Fork</label>
            <label><input type="checkbox" id="toggleCockpit" checked> Seat + Handlebars</label>
            <label><input type="checkbox" id="toggleSpokes" checked> Spokes + Covers</label>

        </div>

        <hr>

        <div id="sceneTree"></div>

    </div>

    <div id="viewport">

        <div id="info">
            Orbit = Inspect<br>
            Scroll = Zoom<br>
            Hybrid MTB Mechanical CAD
        </div>

        <div id="nodeGraph">

            <svg id="nodeLines"
                width="100%"
                height="100%"
                style="position:absolute;left:0;top:0;">
            </svg>

        </div>

    </div>

    <div id="rightPanel">

        <div class="panelTitle">
            Inspector
        </div>

        <div>Bike Geometry: Hybrid MTB</div><br>
        <div>Spoke Pattern: 3-Cross</div><br>
        <div>Flywheel Enabled</div><br>
        <div>Torque Transfer Active</div>

    </div>

</div>

<script type="module">

import * as THREE from "https://esm.sh/three@0.160.0?bundle";

import { OrbitControls }
from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";

///////////////////////////////////////////////////////////
// SCENE
///////////////////////////////////////////////////////////

const viewport =
    document.getElementById("viewport");

const scene =
    new THREE.Scene();

scene.background =
    new THREE.Color(0x050505);

const camera =
    new THREE.PerspectiveCamera(
        60,
        viewport.clientWidth /
        viewport.clientHeight,
        0.1,
        5000
    );

camera.position.set(
    650,
    320,
    850
);

const renderer =
    new THREE.WebGLRenderer({
        antialias:true
    });

renderer.setPixelRatio(
    window.devicePixelRatio
);

renderer.setSize(
    viewport.clientWidth,
    viewport.clientHeight
);

viewport.appendChild(
    renderer.domElement
);

const controls =
    new OrbitControls(
        camera,
        renderer.domElement
    );

controls.enableDamping = true;

///////////////////////////////////////////////////////////
// LIGHTS
///////////////////////////////////////////////////////////

const hemi =
    new THREE.HemisphereLight(
        0xffffff,
        0x222222,
        2
    );

scene.add(hemi);

const dir =
    new THREE.DirectionalLight(
        0xffffff,
        2
    );

dir.position.set(
    400,
    700,
    400
);

scene.add(dir);

///////////////////////////////////////////////////////////
// GRID
///////////////////////////////////////////////////////////

const grid =
    new THREE.GridHelper(
        2000,
        100,
        0x444444,
        0x222222
    );

scene.add(grid);

///////////////////////////////////////////////////////////
// MATERIALS
///////////////////////////////////////////////////////////

const steel =
    new THREE.MeshStandardMaterial({
        color:0x888888,
        metalness:1,
        roughness:0.3
    });

const blackSteel =
    new THREE.MeshStandardMaterial({
        color:0x111111,
        metalness:0.9,
        roughness:0.45
    });

const frameMat =
    new THREE.MeshStandardMaterial({
        color:0xff5b2d,
        metalness:0.2,
        roughness:0.7
    });

const tireMat =
    new THREE.MeshStandardMaterial({
        color:0x060606,
        roughness:1
    });

const seatMat =
    new THREE.MeshStandardMaterial({
        color:0x1a1a1a,
        roughness:0.9
    });

const clearMat =
    new THREE.MeshPhysicalMaterial({
        color:0xffffff,
        transparent:true,
        opacity:0.12,
        transmission:1,
        roughness:0
    });

///////////////////////////////////////////////////////////
// HELPERS
///////////////////////////////////////////////////////////

function tubeBetween(a,b,r=6){

    const dir =
        new THREE.Vector3()
        .subVectors(b,a);

    const len =
        dir.length();

    const geo =
        new THREE.CylinderGeometry(
            r,r,len,16
        );

    const mesh =
        new THREE.Mesh(
            geo,
            frameMat
        );

    mesh.position.copy(a)
        .add(b)
        .multiplyScalar(0.5);

    mesh.quaternion.setFromUnitVectors(
        new THREE.Vector3(0,1,0),
        dir.normalize()
    );

    return mesh;
}

///////////////////////////////////////////////////////////
// GEAR
///////////////////////////////////////////////////////////

function createGear(
    teeth=24,
    radius=42,
    thickness=8
){

    const shape =
        new THREE.Shape();

    const step =
        (Math.PI*2)/teeth;

    for(let i=0;i<=teeth;i++){

        const a = i*step;

        const r =
            i%2===0
            ? radius
            : radius+4;

        const x =
            Math.cos(a)*r;

        const y =
            Math.sin(a)*r;

        if(i===0)
            shape.moveTo(x,y);
        else
            shape.lineTo(x,y);
    }

    const hole =
        new THREE.Path();

    hole.absellipse(
        0,0,
        radius*0.35,
        radius*0.35,
        0,
        Math.PI*2
    );

    shape.holes.push(hole);

    const geo =
        new THREE.ExtrudeGeometry(
            shape,
            {
                depth:thickness,
                bevelEnabled:false
            }
        );

    geo.center();

    const mesh =
        new THREE.Mesh(
            geo,
            steel
        );

    //
    // FIXED:
    // rotate gears correctly
    //

    mesh.rotation.y =
        Math.PI/2;

    return mesh;
}

///////////////////////////////////////////////////////////
// WHEEL
///////////////////////////////////////////////////////////

function createWheel(radius=180){

    const group =
        new THREE.Group();

    ///////////////////////////////////////////////////////
    // tire
    ///////////////////////////////////////////////////////

    const tire =
        new THREE.Mesh(
            new THREE.TorusGeometry(
                radius,
                14,
                24,
                128
            ),
            tireMat
        );

    tire.rotation.y =
        Math.PI/2;

    group.add(tire);

    ///////////////////////////////////////////////////////
    // rim
    ///////////////////////////////////////////////////////

    const rim =
        new THREE.Mesh(
            new THREE.TorusGeometry(
                radius-12,
                5,
                18,
                128
            ),
            steel
        );

    rim.rotation.y =
        Math.PI/2;

    group.add(rim);

    ///////////////////////////////////////////////////////
    // HUB FIX
    ///////////////////////////////////////////////////////

    const hub =
        new THREE.Mesh(
            new THREE.CylinderGeometry(
                16,
                16,
                90,
                32
            ),
            steel
        );

    //
    // FIXED:
    // rotate hub cylinders 90 degrees
    //

    hub.rotation.z =
        Math.PI/2;

    group.add(hub);

    ///////////////////////////////////////////////////////
    // spokes
    ///////////////////////////////////////////////////////

    const spokeGroup =
        new THREE.Group();

    const spokeCount = 32;
    const spokeRadius = radius - 18;

    for(let i=0;i<spokeCount;i++){

        const angle =
            (i/spokeCount)
            *Math.PI*2;

        const cross =
            (Math.PI*2/spokeCount)
            *2.5;

        const rimAngle =
            i%2===0
            ? angle+cross
            : angle-cross;

        const rimPos =
            new THREE.Vector3(
                0,
                Math.cos(rimAngle)
                    *spokeRadius,

                Math.sin(rimAngle)
                    *spokeRadius
            );

        const hubPos =
            new THREE.Vector3(
                i%2===0 ? -10 : 10,
                0,
                0
            );

        const dir =
            new THREE.Vector3()
            .subVectors(
                rimPos,
                hubPos
            );

        const len =
            dir.length();

        const spoke =
            new THREE.Mesh(
                new THREE.CylinderGeometry(
                    1,
                    1,
                    len,
                    6
                ),
                steel
            );

        spoke.position.copy(
            hubPos.clone()
            .add(rimPos)
            .multiplyScalar(0.5)
        );

        spoke.quaternion
            .setFromUnitVectors(
                new THREE.Vector3(0,1,0),
                dir.normalize()
            );

        spokeGroup.add(spoke);
    }

    ///////////////////////////////////////////////////////
    // spoke covers
    ///////////////////////////////////////////////////////

    const cover1 =
        new THREE.Mesh(
            new THREE.CircleGeometry(
                radius-24,
                64
            ),
            clearMat
        );

    cover1.rotation.y =
        Math.PI/2;

    cover1.position.x =
        -12;

    spokeGroup.add(cover1);

    const cover2 =
        cover1.clone();

    cover2.position.x =
        12;

    spokeGroup.add(cover2);

    group.add(spokeGroup);

    group.userData.spokesGroup =
        spokeGroup;

    return group;
}

///////////////////////////////////////////////////////////
// FLYWHEEL + CRANKS
///////////////////////////////////////////////////////////

function createFlywheel(){

    const group =
        new THREE.Group();

    const fly =
        new THREE.Mesh(
            new THREE.CylinderGeometry(
                82,
                82,
                18,
                64
            ),
            blackSteel
        );

    //
    // FIXED:
    // rotate flywheel correctly
    //

    fly.rotation.z =
        Math.PI/2;

    group.add(fly);

    //
    // front cassette gears
    //

    for(let i=0;i<3;i++){

        const gear =
            createGear(
                42-(i*6),
                72-(i*8),
                5
            );

        gear.position.x =
            -10-(i*5);

        group.add(gear);
    }

    ///////////////////////////////////////////////////////
    // crank arms
    ///////////////////////////////////////////////////////

    const crankGeo =
        new THREE.BoxGeometry(
            10,
            110,
            10
        );

    const crank1 =
        new THREE.Mesh(
            crankGeo,
            blackSteel
        );

    crank1.position.y =
        90;

    group.add(crank1);

    const crank2 =
        crank1.clone();

    crank2.rotation.z =
        Math.PI;

    crank2.position.y =
        -90;

    group.add(crank2);

    ///////////////////////////////////////////////////////
    // pedals
    ///////////////////////////////////////////////////////

    const pedalGeo =
        new THREE.BoxGeometry(
            40,
            10,
            20
        );

    const pedal1 =
        new THREE.Mesh(
            pedalGeo,
            steel
        );

    pedal1.position.y =
        145;

    group.add(pedal1);

    const pedal2 =
        pedal1.clone();

    pedal2.position.y =
        -145;

    group.add(pedal2);

    return group;
}

///////////////////////////////////////////////////////////
// HANDLEBARS
///////////////////////////////////////////////////////////

function createHandlebars(){

    const group =
        new THREE.Group();

    //
    // stem
    //

    const stem =
        new THREE.Mesh(
            new THREE.CylinderGeometry(
                6,
                6,
                70,
                12
            ),
            steel
        );

    stem.rotation.z =
        Math.PI/6;

    group.add(stem);

    //
    // bars
    //

    const bar =
        new THREE.Mesh(
            new THREE.CylinderGeometry(
                5,
                5,
                180,
                16
            ),
            blackSteel
        );

    bar.rotation.z =
        Math.PI/2;

    bar.position.set(
        35,
        25,
        0
    );

    group.add(bar);

    return group;
}

///////////////////////////////////////////////////////////
// SEAT
///////////////////////////////////////////////////////////

function createSeat(){

    const group =
        new THREE.Group();

    const post =
        new THREE.Mesh(
            new THREE.CylinderGeometry(
                5,
                5,
                90,
                12
            ),
            steel
        );

    group.add(post);

    const seat =
        new THREE.Mesh(
            new THREE.BoxGeometry(
                80,
                14,
                40
            ),
            seatMat
        );

    seat.position.y =
        48;

    seat.rotation.z =
        -0.08;

    group.add(seat);

    return group;
}

///////////////////////////////////////////////////////////
// FRAME
///////////////////////////////////////////////////////////

function createBikeFrame(){

    const g =
        new THREE.Group();

    const pts = {

        rearAxle:
            new THREE.Vector3(
                0,
                320,
                0
            ),

        frontAxle:
            new THREE.Vector3(
                520,
                320,
                0
            ),

        bottomBracket:
            new THREE.Vector3(
                190,
                170,
                0
            ),

        seatTubeTop:
            new THREE.Vector3(
                130,
                340,
                0
            ),

        headTubeTop:
            new THREE.Vector3(
                390,
                320,
                0
            ),

        headTubeBottom:
            new THREE.Vector3(
                420,
                240,
                0
            )
    };

    const tubes = [

        ["bottomBracket","seatTubeTop"],
        ["seatTubeTop","headTubeTop"],
        ["bottomBracket","headTubeBottom"],
        ["seatTubeTop","rearAxle"],
        ["bottomBracket","rearAxle"],
        ["headTubeBottom","headTubeTop"]

    ];

    tubes.forEach(t=>{

        g.add(
            tubeBetween(
                pts[t[0]],
                pts[t[1]],
                7
            )
        );
    });

    return g;
}

///////////////////////////////////////////////////////////
// CHAIN
///////////////////////////////////////////////////////////

function createChain(){

    const group =
        new THREE.Group();

    const front =
        new THREE.Vector2(
            190,
            170
        );

    const rear =
        new THREE.Vector2(
            0,
            320
        );

    for(let i=0;i<180;i++){

        const t =
            i/179;

        const x =
            THREE.MathUtils.lerp(
                front.x,
                rear.x,
                t
            );

        const y =
            THREE.MathUtils.lerp(
                front.y,
                rear.y,
                t
            );

        const link =
            new THREE.Mesh(
                new THREE.BoxGeometry(
                    5,
                    2,
                    8
                ),
                steel
            );

        link.position.set(
            x,
            y,
            -18
        );

        group.add(link);
    }

    return group;
}

///////////////////////////////////////////////////////////
// BUILD BIKE
///////////////////////////////////////////////////////////

const systems = {};

systems.rearWheel =
    createWheel(180);

systems.rearWheel.position.set(
    0,
    320,
    0
);

scene.add(
    systems.rearWheel
);

systems.frontWheel =
    createWheel(180);

systems.frontWheel.position.set(
    520,
    320,
    0
);

scene.add(
    systems.frontWheel
);

systems.frame =
    createBikeFrame();

scene.add(
    systems.frame
);

systems.flywheel =
    createFlywheel();

systems.flywheel.position.set(
    190,
    170,
    0
);

scene.add(
    systems.flywheel
);

systems.rearGear =
    createGear(
        18,
        42,
        8
    );

systems.rearGear.position.set(
    -22,
    320,
    0
);

scene.add(
    systems.rearGear
);

systems.chain =
    createChain();

scene.add(
    systems.chain
);

///////////////////////////////////////////////////////////
// HANDLEBARS
///////////////////////////////////////////////////////////

systems.handlebars =
    createHandlebars();

systems.handlebars.position.set(
    410,
    330,
    0
);

scene.add(
    systems.handlebars
);

///////////////////////////////////////////////////////////
// SEAT
///////////////////////////////////////////////////////////

systems.seat =
    createSeat();

systems.seat.position.set(
    130,
    390,
    0
);

scene.add(
    systems.seat
);

///////////////////////////////////////////////////////////
// TOGGLES
///////////////////////////////////////////////////////////

function setupToggle(id,objects){

    document.getElementById(id)
    .addEventListener(
        "change",
        e=>{

            objects.forEach(o=>{

                if(o)
                    o.visible =
                        e.target.checked;
            });
        }
    );
}

setupToggle(
    "toggleFrame",
    [systems.frame]
);

setupToggle(
    "toggleWheels",
    [
        systems.frontWheel,
        systems.rearWheel
    ]
);

setupToggle(
    "toggleChain",
    [systems.chain]
);

setupToggle(
    "toggleFlywheel",
    [
        systems.flywheel,
        systems.rearGear
    ]
);

setupToggle(
    "toggleCockpit",
    [
        systems.handlebars,
        systems.seat
    ]
);

setupToggle(
    "toggleSpokes",
    [
        systems.frontWheel.userData.spokesGroup,
        systems.rearWheel.userData.spokesGroup
    ]
);

///////////////////////////////////////////////////////////
// NODE GRAPH
///////////////////////////////////////////////////////////

const nodeGraph =
    document.getElementById(
        "nodeGraph"
    );

const nodes = [

    {
        id:"wheel",
        x:40,
        y:60
    },

    {
        id:"frame",
        x:160,
        y:130
    },

    {
        id:"flywheel",
        x:290,
        y:70
    }
];

function createNode(n){

    const el =
        document.createElement("div");

    el.className =
        "node";

    el.style.left =
        n.x+"px";

    el.style.top =
        n.y+"px";

    el.innerHTML =
        `<b>${n.id}</b><br>
        mechanical node`;

    nodeGraph.appendChild(el);

    let dragging=false;

    el.addEventListener(
        "mousedown",
        ()=>dragging=true
    );

    window.addEventListener(
        "mouseup",
        ()=>dragging=false
    );

    window.addEventListener(
        "mousemove",
        e=>{

            if(!dragging)return;

            const rect =
                nodeGraph.getBoundingClientRect();

            n.x =
                e.clientX
                -rect.left
                -60;

            n.y =
                e.clientY
                -rect.top
                -25;

            el.style.left =
                n.x+"px";

            el.style.top =
                n.y+"px";

            drawLines();
        }
    );
}

nodes.forEach(createNode);

function drawLines(){

    const svg =
        document.getElementById(
            "nodeLines"
        );

    svg.innerHTML="";

    for(let i=0;i<nodes.length-1;i++){

        const a=nodes[i];
        const b=nodes[i+1];

        const line =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "line"
            );

        line.setAttribute(
            "x1",
            a.x+60
        );

        line.setAttribute(
            "y1",
            a.y+25
        );

        line.setAttribute(
            "x2",
            b.x+60
        );

        line.setAttribute(
            "y2",
            b.y+25
        );

        line.setAttribute(
            "stroke",
            "#8ff"
        );

        line.setAttribute(
            "stroke-width",
            "2"
        );

        svg.appendChild(line);
    }
}

drawLines();

///////////////////////////////////////////////////////////
// ANIMATION
///////////////////////////////////////////////////////////

let simEnabled = true;

document.getElementById(
    "toggleSimBtn"
).onclick = ()=>{

    simEnabled =
        !simEnabled;
};

let angle = 0;

function animate(){

    requestAnimationFrame(
        animate
    );

    if(simEnabled){

        angle += 0.02;

        systems.flywheel.rotation.x
            -= 0.03;

        systems.rearGear.rotation.x
            -= 0.06;

        systems.frontWheel.rotation.x
            -= 0.02;

        systems.rearWheel.rotation.x
            -= 0.02;
    }

    controls.update();

    renderer.render(
        scene,
        camera
    );
}

animate();

///////////////////////////////////////////////////////////
// RESIZE
///////////////////////////////////////////////////////////

window.addEventListener(
    "resize",
    ()=>{

        const w =
            viewport.clientWidth;

        const h =
            viewport.clientHeight;

        camera.aspect =
            w/h;

        camera.updateProjectionMatrix();

        renderer.setSize(
            w,
            h
        );
    }
);

</script>

</body>
</html>
