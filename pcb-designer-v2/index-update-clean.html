<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>PCB Designer</title>
    <style>
      body { margin: 0; overflow: hidden; }
      #ui { position: absolute; top: 10px; left: 10px; color: white; }
    </style>
  </head>
  <body>
    <div id="ui">Click pads to select. Drag components. Press R to rotate.</div>

    <script type="module">
      import * as THREE from "https://esm.sh/three@0.160.0?bundle";
      import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";
      import { TransformControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/TransformControls.js";
      import {
        acceleratedRaycast
      } from "https://esm.sh/three-mesh-bvh@0.7.4";
      import GUI from "https://esm.sh/lil-gui@0.18.2";

      /* === BVH SETUP === */
      THREE.Mesh.prototype.raycast = acceleratedRaycast;

      /* === SCENE SETUP === */
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
      camera.position.set(0, 100, 100);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(innerWidth, innerHeight);
      document.body.appendChild(renderer.domElement);

      const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
      scene.add(light);

      const controls = new OrbitControls(camera, renderer.domElement);

      /* === TRACE PREVIEW === */
      /* === RoutingMode: "manhattan" | "45deg" === */
      function solveCorner(a, b, mode) {
        if (mode === "manhattan") {
          // 90° routing (L-shape)
          return new THREE.Vector3(b.x, a.y, a.z);
        }
        if (mode === "45deg") {
          const dx = b.x - a.x;
          const dz = b.z - a.z;
          const dist = Math.min(Math.abs(dx), Math.abs(dz));
          return new THREE.Vector3(
            a.x + Math.sign(dx) * dist,
            a.y,
            a.z + Math.sign(dz) * dist
          );
        }
        return b;
      }//end solveCorner
      let lockedAxis = null;
      function applyAxisLock(start, current) {
        if (!lockedAxis) {
          const dx = Math.abs(current.x - start.x);
          const dz = Math.abs(current.z - start.z);
          lockedAxis = dx > dz ? "x" : "z";
        }
        if (lockedAxis === "x") {
          current.z = start.z;
        } else {
          current.x = start.x;
        }
        return current;
      }//end applyAxisLock
      class TracePreview {
        constructor(scene) {
          this.scene = scene;
          this.group = new THREE.Group();
          this.points = [];
          this.width = 0.6;
          this.mode = "manhattan";
          this.material = new THREE.MeshStandardMaterial({
            color: 0xffaa00,
            emissive: 0xff6600,
            emissiveIntensity: 0.3
          });
          this.scene.add(this.group);
        }
        start(p) {
          this.points = [p.clone()];
        }
        addPoint(p) {
          this.points.push(p.clone());
        }
        updateCursor(cursor) {
          if (this.points.length === 0) return;
          const last = this.points[this.points.length - 1];
          const corner = solveCorner(last, cursor, this.mode);
          const previewPoints = [
            ...this.points,
            corner,
            cursor.clone()
          ];
          this.draw(previewPoints);
        }
        finish() {
          const result = [...this.points];
          this.clear();
          return result;
        }
        clear() {
          this.group.clear();
          this.points = [];
        }
        draw(points) {
          this.group.clear();
          for (let i = 0; i < points.length - 1; i++) {
            const a = points[i];
            const b = points[i + 1];
            const segment = this.createSegment(a, b);
            this.group.add(segment);
          }
        }
        createSegment(a, b) {
          const length = a.distanceTo(b);
          const geo = new THREE.BoxGeometry(this.width, 0.05, length);
          const mesh = new THREE.Mesh(geo, this.material);
          const mid = new THREE.Vector3()
            .addVectors(a, b)
            .multiplyScalar(0.5);
          mesh.position.copy(mid);
          mesh.lookAt(b);
          mesh.rotateX(Math.PI / 2);
          return mesh;
        }
      }//end TracePreview
      /* === Alt smooth traces === */
      class TracePreviewTube {
        constructor(scene) {
          this.scene = scene;
          this.mesh = null;
          this.points = [];
          this.width = 0.6;
          this.material = new THREE.MeshStandardMaterial({
            color: 0xff5500,
            emissive: 0xff2200,
            emissiveIntensity: 0.5
          });
        }
        start(point) {
          this.points = [point.clone()];
        }
        addPoint(point) {
          this.points.push(point.clone());
        }
        updateCursor(point) {
          if (this.points.length === 0) return;
          const previewPoints = [...this.points, point.clone()];
          this.draw(previewPoints);
        }
        finish() {
          const finalPoints = [...this.points];
          this.clear();
          return finalPoints;
        }
        clear() {
          if (this.mesh) {
            this.scene.remove(this.mesh);
            this.mesh.geometry.dispose();
            this.mesh = null;
          }
          this.points = [];
        }
        draw(points) {
          if (this.mesh) {
            this.scene.remove(this.mesh);
            this.mesh.geometry.dispose();
          }
          if (points.length < 2) return;
          const curve = new THREE.CatmullRomCurve3(points);
          const geometry = new THREE.TubeGeometry(
            curve,
            points.length * 10,
            this.width / 2,
            8,
            false
          );
          this.mesh = new THREE.Mesh(geometry, this.material);
          this.scene.add(this.mesh);
        }
      }//end TracePreviewTube
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      
      function getMousePoint(event, camera) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        const point = new THREE.Vector3();
        raycaster.ray.intersectPlane(plane, point);
        return point;
      }
      
      function snapToGrid(v, grid = 1) {
        v.x = Math.round(v.x / grid) * grid;
        v.z = Math.round(v.z / grid) * grid;
        return v;
      }

      /**
      const tracePreview = new TracePreview(scene);
      let routing = false;
      window.addEventListener("mousedown", (e) => {
        const p = snapToGrid(getMousePoint(e, camera));
        if (!routing) {
          tracePreview.start(p);
          routing = true;
        } else {
          tracePreview.addPoint(p);
        }
      });
      
      window.addEventListener("mousemove", (e) => {
        if (!routing) return;
        const p = snapToGrid(getMousePoint(e, camera));
        tracePreview.updateCursor(p);
      });
      
      window.addEventListener("dblclick", () => {
        if (!routing) return;
        const final = tracePreview.finish();
        console.log("Final trace:", final);
        routing = false;
      });
      **/
      /* === CONFIG BOARD STACK === */
      const stack = [
       {name:"topCopper", z:0.8},
       {name:"substrate", z:0},
       {name:"bottomCopper", z:-0.8}
      ]//end board stack
      function copperLayer(shape){
        const geo = new THREE.ExtrudeGeometry(shape,{
           depth:0.05,
           bevelEnabled:false
        })
        return new THREE.Mesh(
           geo,
           new THREE.MeshStandardMaterial({
              color:0xffa000,
              metalness:.8
           })
        )
      }
      /* === UTIL === */
      function aStar(start, goal, grid){
        const open = []
        const closed = []
        open.push(start)
      
        while(open.length){
          const current = open.pop()
          if(current == goal)
             return reconstructPath()
          for(const n of neighbors(current)){
              if(grid[n] == "blocked")
                 continue
              open.push(n)
          }
        }
      }//end aStart
      function isPadShape(obj) {
        return (
          obj &&
          obj.position instanceof THREE.Vector3 &&
          typeof obj.size === "number"
        );
      }//end isPadShape
      function importSimpleNetlist(data, components, netManager) {
        for (const netDef of data.nets) {
          const net = netManager.createNet(netDef.name)
          for (const ref of netDef.pads) {
            const comp = components.find(c => c.ref === ref.comp)
            if (!comp) continue
            const pad = comp.pads[ref.pad]
            if (pad) pad.connect(net)
          }
        }
      }
      /* == THREEjs Mesh STRUCTURES == */
      class PCBBoard {
        constructor(width = 100, height = 80, thickness = 1.6) {
          const geo = new THREE.BoxGeometry(width, thickness, height);
      
          const mat = new THREE.MeshStandardMaterial({
            color: 0x0f6a2f
          });
      
          this.mesh = new THREE.Mesh(geo, mat);
          this.mesh.position.y = thickness / 2;
        }
      }
      /* === DATA STRUCTURES === */
      class SelectionManager {
        constructor(camera, scene) {
          this.raycaster = new THREE.Raycaster();
          this.mouse = new THREE.Vector2();
          this.camera = camera;
          this.scene = scene;
          this.selected = null;
        }
        pick(e) {
          this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
          this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
          this.raycaster.setFromCamera(this.mouse, this.camera);
          const hits = this.raycaster.intersectObjects(this.scene.children, true);
          if (!hits.length) return null;
          const obj = hits[0].object;
          if (obj.userData && obj.userData.pad) {
            return obj.userData.pad;
          }
          if (obj.parent && obj.parent.userData && obj.parent.userData.component) {
            return obj.parent.userData.component;
          }
          return null;
        }
      }
      class DragManager {
        constructor(camera) {
          this.dragging = null;
          this.plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
          this.raycaster = new THREE.Raycaster();
          this.mouse = new THREE.Vector2();
          this.camera = camera;
        }
        start(obj) {
          if (obj && obj.group) {
            this.dragging = obj;
          }
        }
        update(e) {
          if (!this.dragging) return;
          this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
          this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
          this.raycaster.setFromCamera(this.mouse, this.camera);
          const p = new THREE.Vector3();
          this.raycaster.ray.intersectPlane(this.plane, p);
          // snap
          p.x = Math.round(p.x / 1) * 1;
          p.z = Math.round(p.z / 1) * 1;
          this.dragging.group.position.copy(p);
        }
        stop() {
          this.dragging = null;
        }
      }//end DragManager2
      class Net {
        constructor(id, color) {
          this.id = id
          this.color = color
          this.pads = new Set();
        }
      }//end NET
      export class NetManager {
        nets = new Map()
        createNet(name) {
          const net = new Net(name, Math.random() * 0xffffff)
          this.nets.set(name, net)
          return net
        }
        get(name) {
          return this.nets.get(name)
        }
      }
      class PadShape {
        constructor(position, size) {
          this.position = position;
          this.size = size;
        }
      }//end PadShape
      class Footprint {
        constructor(name, pads) {
          this.name = name;
          this.pads = pads.filter(isPadShape);
        }
      }//end Footprint
      class Pad {
        constructor(id, pos, size) {
          const geo = new THREE.CircleGeometry(size, 16);
          const mat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });

          this.mesh = new THREE.Mesh(geo, mat);
          this.mesh.rotation.x = -Math.PI / 2;
          this.mesh.position.copy(pos);
          this.mesh.userData.pad = this;

          this.id = id;
          this.net = null;
        }
        connect(net) {
          this.net = net;
          net.pads.add(this);
          this.mesh.material.color.set(net.color);
        }
      }//end Pad
      class Component {
        constructor(fp, pos) {
          this.group = new THREE.Group();
          this.pads = [];

          let i = 0;
          for (const p of fp.pads) {
            const pad = new Pad("pad_" + i++, p.position.clone(), p.size);
            this.pads.push(pad);
            this.group.add(pad.mesh);
          }

          this.group.position.copy(pos);
          this.group.userData.component = this;
        }
      }//end Component

      /* === TEST PCBBOARD CLASS === */
      const pcb = new PCBBoard(85, 56, 1.6)
      scene.add(pcb.mesh)
      
      /* === TEST DATA === */
      const footprint = new Footprint("test", [
        new PadShape(new THREE.Vector3(-5, 0, 0), 2),
        new PadShape(new THREE.Vector3(5, 0, 0), 2)
      ]);

      const component1 = new Component(footprint, new THREE.Vector3(0, 0, 0));
      component1.ref = "R1"
      const component2 = new Component(footprint, new THREE.Vector3(10,0,0))
      component2.ref = "R2"
      scene.add(component1.group);
      scene.add(component2.group)
      const components = [component1, component2]

      // systems
      const selector = new SelectionManager(camera, scene)
      const dragger = new DragManager(camera)
      const netManager = new NetManager()

      // sample netlist
      importSimpleNetlist({
        nets:[
          {name:"NET1", pads:[{comp:"R1", pad:0},{comp:"R2", pad:1}]}
        ]
      }, components, netManager)

      window.addEventListener("mousedown", e=>{
        const picked = selector.pick(e)
        if (!picked) return
        if (picked.group) dragger.start(picked)
      })//end mousedown
      window.addEventListener("mousemove", e=>{
        dragger.update(e)
      })//end mousemove
      window.addEventListener("mouseup", ()=>{
        dragger.stop()
      })//end mouseup
      window.addEventListener("keydown", e=>{
        if (e.key==="r" && selector.selected?.group) {
          selector.selected.group.rotation.y += Math.PI/2
        }
      })//end keydown
      
      /* === RENDER LOOP === */
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }//end animate
      animate();

      /* === RESIZE === */
      window.addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });
    </script>
  </body>
</html>
