<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hybrid CAD + PCB + Gear + Motor EDA Demo</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#1e1f22;
    font-family:Arial,Helvetica,sans-serif;
    color:#ddd;
}

#app{
    display:flex;
    width:100%;
    height:100%;
}

/* LEFT PANEL */
#sidebar{
    width:300px;
    background:#25262a;
    border-right:1px solid #444;
    display:flex;
    flex-direction:column;
}

.panelTitle{
    padding:10px;
    background:#303238;
    border-bottom:1px solid #444;
    font-weight:bold;
    font-size:14px;
}

.tree{
    flex:1;
    overflow:auto;
}

.treeItem{
    padding:8px 12px;
    border-bottom:1px solid #34363c;
    cursor:pointer;
    user-select:none;
}

.treeItem:hover{
    background:#3a3d44;
}

.treeItem.active{
    background:#5b6ea8;
}

.sub{
    padding-left:24px;
    color:#aaa;
}

#properties{
    height:340px;
    overflow:auto;
    border-top:1px solid #444;
    background:#202124;
    padding:10px;
}

.prop{
    margin-bottom:12px;
}

.prop label{
    display:block;
    font-size:12px;
    margin-bottom:4px;
    color:#aaa;
}

.prop input{
    width:100%;
}

button{
    background:#4d5666;
    border:none;
    color:white;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#657188;
}

/* MAIN */
#main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* TOOLBAR */
#toolbar{
    height:54px;
    background:#2c2e34;
    border-bottom:1px solid #444;
    display:flex;
    align-items:center;
    gap:8px;
    padding:0 12px;
}

.tool{
    background:#444b57;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    user-select:none;
}

.tool:hover{
    background:#596172;
}

.tool.active{
    background:#6d86d1;
}

/* VIEWPORT */
#viewport{
    position:relative;
    flex:1;
    overflow:hidden;
}

canvas{
    display:block;
}

/* STATUS */
#status{
    position:absolute;
    left:12px;
    bottom:12px;
    background:rgba(0,0,0,0.65);
    padding:10px 14px;
    border-radius:8px;
    font-size:13px;
    backdrop-filter:blur(4px);
}

/* NODE EDITOR */
#nodeEditor{
    position:absolute;
    top:20px;
    right:20px;
    width:320px;
    background:#27282c;
    border:1px solid #555;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

#nodeHeader{
    padding:10px;
    background:#393c44;
    font-weight:bold;
}

.node{
    margin:10px;
    padding:10px;
    background:#35383f;
    border-radius:8px;
    border:1px solid #555;
}

.node label{
    display:block;
    font-size:12px;
    margin-bottom:4px;
    color:#aaa;
}

.node input{
    width:100%;
}

/* COMPONENT LIBRARY */
#componentLibrary{
    position:absolute;
    left:20px;
    top:20px;
    width:320px;
    height:440px;
    background:#23252b;
    border:1px solid #555;
    border-radius:10px;
    overflow:auto;
    box-shadow:0 8px 30px rgba(0,0,0,0.5);
}

.libHeader{
    background:#353842;
    padding:10px;
    font-weight:bold;
    border-bottom:1px solid #444;
}

.componentCard{
    margin:10px;
    padding:10px;
    border-radius:8px;
    background:#2f3238;
    border:1px solid #444;
}

.componentCard:hover{
    background:#3b4049;
}

.compTitle{
    font-weight:bold;
    margin-bottom:6px;
}

.netBadge{
    display:inline-block;
    padding:2px 6px;
    border-radius:4px;
    background:#5a6db5;
    font-size:11px;
    margin-top:6px;
}
</style>
</head>

<body>

<div id="app">

    <!-- SIDEBAR -->
    <div id="sidebar">

        <div class="panelTitle">
            Hybrid CAD / PCB Workflow
        </div>

        <div class="tree" id="tree">

            <div class="treeItem active">Motor PCB Assembly</div>

            <div class="treeItem sub">Motor Housing</div>
            <div class="treeItem sub">Planetary Gear</div>
            <div class="treeItem sub">Main Drive Gear</div>
            <div class="treeItem sub">Rotor Shaft</div>
            <div class="treeItem sub">Motor Driver PCB</div>
            <div class="treeItem sub">USB-C Adapter</div>
            <div class="treeItem sub">Molex Connector</div>
            <div class="treeItem sub">Capacitor Bank</div>
            <div class="treeItem sub">Power MOSFETs</div>
            <div class="treeItem sub">MCU</div>
            <div class="treeItem sub">Hall Sensor</div>

        </div>

        <div id="properties">

            <div class="prop">
                <label>Gear Teeth</label>
                <input type="range" min="8" max="50" value="18" id="teethRange"/>
            </div>

            <div class="prop">
                <label>Outer Radius</label>
                <input type="range" min="1" max="4" step="0.01" value="1.7" id="outerRadius"/>
            </div>

            <div class="prop">
                <label>Tooth Depth</label>
                <input type="range" min="0.05" max="0.6" step="0.01" value="0.2" id="toothDepth"/>
            </div>

            <div class="prop">
                <label>PCB Arc Radius</label>
                <input type="range" min="2" max="6" step="0.1" value="3.5" id="pcbRadius"/>
            </div>

            <button id="autorouteBtn">
                Autoroute PCB Nets
            </button>

        </div>

    </div>

    <!-- MAIN -->
    <div id="main">

        <div id="toolbar">

            <div class="tool active">Select</div>
            <div class="tool">Route</div>
            <div class="tool">Via</div>
            <div class="tool">Component</div>
            <div class="tool">Move</div>
            <div class="tool">Rotate</div>
            <div class="tool">DRC</div>

        </div>

        <div id="viewport">

            <div id="status">
                Ready
            </div>

            <!-- NODE EDITOR -->
            <div id="nodeEditor">

                <div id="nodeHeader">
                    Geometry + PCB Nodes
                </div>

                <div class="node">
                    <label>Gear Teeth</label>
                    <input type="range" min="8" max="50" value="18" id="nodeTeeth"/>
                </div>

                <div class="node">
                    <label>PCB Radius</label>
                    <input type="range" min="2" max="6" value="3.5" step="0.1" id="nodePCBRadius"/>
                </div>

                <div class="node">
                    <label>Motor Height</label>
                    <input type="range" min="1" max="6" value="2.2" step="0.1"/>
                </div>

            </div>

            <!-- COMPONENT LIBRARY -->
            <div id="componentLibrary">

                <div class="libHeader">
                    Component Library
                </div>

                <div id="componentCards"></div>

            </div>

        </div>

    </div>

</div>

<script type="module">

import * as THREE from 'https://esm.sh/three@0.165.0';
import { OrbitControls } from 'https://esm.sh/three@0.165.0/examples/jsm/controls/OrbitControls.js';

///////////////////////////////////////////////////////////
// THREE SETUP
///////////////////////////////////////////////////////////

const viewport = document.getElementById("viewport");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f1013);

const camera = new THREE.PerspectiveCamera(
    45,
    viewport.clientWidth / viewport.clientHeight,
    0.1,
    1000
);

camera.position.set(10,7,10);

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    viewport.clientWidth,
    viewport.clientHeight
);

renderer.setPixelRatio(devicePixelRatio);

viewport.appendChild(renderer.domElement);

const controls = new OrbitControls(
    camera,
    renderer.domElement
);

controls.enableDamping = true;

///////////////////////////////////////////////////////////
// LIGHTING
///////////////////////////////////////////////////////////

const hemi = new THREE.HemisphereLight(
    0xffffff,
    0x222222,
    2
);

scene.add(hemi);

const dir = new THREE.DirectionalLight(
    0xffffff,
    3
);

dir.position.set(5,10,8);

scene.add(dir);

///////////////////////////////////////////////////////////
// GRID
///////////////////////////////////////////////////////////

const grid = new THREE.GridHelper(
    40,
    40,
    0x444444,
    0x222222
);

scene.add(grid);

///////////////////////////////////////////////////////////
// PARAMS
///////////////////////////////////////////////////////////

const params = {
    teeth:18,
    outerRadius:1.7,
    toothDepth:0.2,
    pcbRadius:3.5
};

///////////////////////////////////////////////////////////
// MATERIALS
///////////////////////////////////////////////////////////

const metalMat = new THREE.MeshStandardMaterial({
    color:0x777777,
    metalness:0.85,
    roughness:0.3
});

const blackMat = new THREE.MeshStandardMaterial({
    color:0x111111,
    metalness:0.8,
    roughness:0.45
});

const pcbMat = new THREE.MeshStandardMaterial({
    color:0x102015,
    metalness:0.2,
    roughness:0.8
});

const capMat = new THREE.MeshStandardMaterial({
    color:0x999999,
    metalness:0.7,
    roughness:0.4
});

const traceMat = new THREE.MeshStandardMaterial({
    color:0x00ff99,
    emissive:0x003311
});

///////////////////////////////////////////////////////////
// COMPONENT JSON OBJECT
///////////////////////////////////////////////////////////

const componentLibrary = {

    capacitors:[
        {
            id:"C1",
            name:"Electrolytic Capacitor",
            package:"Radial Can",
            type:"Cylinder",
            size:"10x12mm",
            net:"VBAT"
        },
        {
            id:"C2",
            name:"MLCC Ceramic Capacitor",
            package:"1206",
            type:"Rectangular",
            size:"3.2x1.6mm",
            net:"5V"
        },
        {
            id:"C3",
            name:"MLCC Ceramic Capacitor",
            package:"0805",
            type:"Rectangular",
            size:"2.0x1.25mm",
            net:"3V3"
        }
    ],

    connectors:[
        {
            id:"J1",
            name:"USB-C Connector",
            pins:24,
            net:"USB"
        },
        {
            id:"J2",
            name:"Molex Female Connector",
            pins:6,
            net:"MOTOR_PHASE"
        }
    ],

    semiconductors:[
        {
            id:"U1",
            name:"Motor Driver ASIC",
            package:"QFN-48"
        },
        {
            id:"Q1",
            name:"MOSFET",
            package:"DFN"
        }
    ],

    sensors:[
        {
            id:"H1",
            name:"Hall Sensor",
            package:"SOT23"
        }
    ]
};

///////////////////////////////////////////////////////////
// NETLIST
///////////////////////////////////////////////////////////

const netlist = [

    { from:"USB-C", to:"ASIC", net:"5V" },
    { from:"ASIC", to:"MOSFET_A", net:"PWM_A" },
    { from:"ASIC", to:"MOSFET_B", net:"PWM_B" },
    { from:"ASIC", to:"MOSFET_C", net:"PWM_C" },
    { from:"Battery+", to:"CapacitorBank", net:"VBAT" },
    { from:"CapacitorBank", to:"MOSFETS", net:"VBAT" },
    { from:"HallSensor", to:"ASIC", net:"HALL_SIGNAL" },
    { from:"Molex", to:"MotorWindings", net:"PHASE_OUT" }

];

///////////////////////////////////////////////////////////
// PCB ARC BOARD
///////////////////////////////////////////////////////////

let pcbGroup;

function buildPCB(){

    if(pcbGroup){

        scene.remove(pcbGroup);

    }

    pcbGroup = new THREE.Group();

    const arcShape = new THREE.Shape();

    const r = params.pcbRadius;

    arcShape.absarc(
        0,
        0,
        r,
        0,
        Math.PI * 0.75,
        false
    );

    arcShape.lineTo(0,0);

    const geo = new THREE.ExtrudeGeometry(
        arcShape,
        {
            depth:0.15,
            bevelEnabled:false
        }
    );

    const pcb = new THREE.Mesh(
        geo,
        pcbMat
    );

    pcb.rotation.x = -Math.PI/2;

    pcbGroup.add(pcb);

    // CAPACITOR CYLINDERS
    for(let i=0;i<4;i++){

        const cap = new THREE.Mesh(
            new THREE.CylinderGeometry(0.18,0.18,0.4,32),
            capMat
        );

        cap.position.set(
            1.2 + i * 0.4,
            0.25,
            -1.0
        );

        pcbGroup.add(cap);
    }

    // RECTANGULAR CAPS
    for(let i=0;i<6;i++){

        const rectCap = new THREE.Mesh(
            new THREE.BoxGeometry(0.18,0.08,0.12),
            new THREE.MeshStandardMaterial({
                color:0xc8b47c
            })
        );

        rectCap.position.set(
            0.5 + i * 0.3,
            0.08,
            -0.2
        );

        pcbGroup.add(rectCap);
    }

    // ASIC
    const asic = new THREE.Mesh(
        new THREE.BoxGeometry(0.6,0.08,0.6),
        new THREE.MeshStandardMaterial({
            color:0x111111
        })
    );

    asic.position.set(1.4,0.08,0.4);

    pcbGroup.add(asic);

    // USB-C
    const usb = new THREE.Mesh(
        new THREE.BoxGeometry(0.5,0.18,0.22),
        metalMat
    );

    usb.position.set(-0.5,0.12,1.1);

    pcbGroup.add(usb);

    // MOLEX
    const molex = new THREE.Mesh(
        new THREE.BoxGeometry(0.5,0.3,0.25),
        new THREE.MeshStandardMaterial({
            color:0xf5f5f5
        })
    );

    molex.position.set(2.2,0.15,0.8);

    pcbGroup.add(molex);

    // ROUTES
    createTrace(
        new THREE.Vector3(-0.5,0.1,1.1),
        new THREE.Vector3(1.4,0.1,0.4)
    );

    createTrace(
        new THREE.Vector3(1.4,0.1,0.4),
        new THREE.Vector3(2.2,0.1,0.8)
    );

    scene.add(pcbGroup);

}

///////////////////////////////////////////////////////////
// TRACE ROUTING
///////////////////////////////////////////////////////////

function createTrace(a,b){

    const points = [];

    points.push(a);

    points.push(
        new THREE.Vector3(
            (a.x+b.x)/2,
            0.1,
            a.z
        )
    );

    points.push(
        new THREE.Vector3(
            (a.x+b.x)/2,
            0.1,
            b.z
        )
    );

    points.push(b);

    const curve = new THREE.CatmullRomCurve3(points);

    const geo = new THREE.TubeGeometry(
        curve,
        32,
        0.03,
        8,
        false
    );

    const mesh = new THREE.Mesh(
        geo,
        traceMat
    );

    pcbGroup.add(mesh);

}

///////////////////////////////////////////////////////////
// GEAR
///////////////////////////////////////////////////////////

let gear;

function buildGear(){

    if(gear){

        scene.remove(gear);

    }

    const shape = new THREE.Shape();

    const teeth = params.teeth;

    const step = Math.PI*2 / teeth;

    for(let i=0;i<teeth;i++){

        const a = i * step;

        const r1 = params.outerRadius;
        const r2 = params.outerRadius + params.toothDepth;

        const p1x = Math.cos(a) * r1;
        const p1y = Math.sin(a) * r1;

        const p2x = Math.cos(a+step*0.3) * r2;
        const p2y = Math.sin(a+step*0.3) * r2;

        const p3x = Math.cos(a+step*0.6) * r2;
        const p3y = Math.sin(a+step*0.6) * r2;

        const p4x = Math.cos(a+step) * r1;
        const p4y = Math.sin(a+step) * r1;

        if(i===0){
            shape.moveTo(p1x,p1y);
        }

        shape.lineTo(p2x,p2y);
        shape.lineTo(p3x,p3y);
        shape.lineTo(p4x,p4y);

    }

    const hole = new THREE.Path();

    hole.absellipse(
        0,
        0,
        0.5,
        0.5,
        0,
        Math.PI*2
    );

    shape.holes.push(hole);

    const geo = new THREE.ExtrudeGeometry(
        shape,
        {
            depth:0.4,
            bevelEnabled:false
        }
    );

    gear = new THREE.Mesh(
        geo,
        metalMat
    );

    gear.rotation.x = Math.PI/2;

    gear.position.set(-4,0.2,0);

    scene.add(gear);

}

///////////////////////////////////////////////////////////
// MOTOR HOUSING
///////////////////////////////////////////////////////////

function buildMotorHousing(){

    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(
            2.4,
            2.4,
            2.5,
            64,
            1,
            true,
            0,
            Math.PI*1.4
        ),
        blackMat
    );

    body.rotation.z = Math.PI/2;

    body.position.set(4,1.5,0);

    scene.add(body);

}

///////////////////////////////////////////////////////////
// COMPONENT LIBRARY UI
///////////////////////////////////////////////////////////

const cards = document.getElementById("componentCards");

function addComponentCard(name,desc,net){

    const div = document.createElement("div");

    div.className = "componentCard";

    div.innerHTML = `
        <div class="compTitle">${name}</div>
        <div>${desc}</div>
        <div class="netBadge">${net}</div>
    `;

    cards.appendChild(div);

}

componentLibrary.capacitors.forEach(c=>{

    addComponentCard(
        c.name,
        c.package + " • " + c.size,
        c.net
    );

});

componentLibrary.connectors.forEach(c=>{

    addComponentCard(
        c.name,
        c.pins + " pins",
        c.net
    );

});

///////////////////////////////////////////////////////////
// AUTOROUTER
///////////////////////////////////////////////////////////

document
.getElementById("autorouteBtn")
.addEventListener("click",()=>{

    setStatus(
        "Rip-up + Retry Autorouter Running..."
    );

    traceMat.emissiveIntensity = 4;

    setTimeout(()=>{

        traceMat.emissiveIntensity = 1;

        setStatus(
            "Autoroute Complete • DRC Passed"
        );

    },1200);

});

///////////////////////////////////////////////////////////
// STATUS
///////////////////////////////////////////////////////////

function setStatus(text){

    document.getElementById("status").innerText = text;

}

///////////////////////////////////////////////////////////
// BINDINGS
///////////////////////////////////////////////////////////

function bindSlider(id,key){

    document
    .getElementById(id)
    .addEventListener("input",(e)=>{

        params[key] = parseFloat(e.target.value);

        buildGear();
        buildPCB();

    });

}

bindSlider("teethRange","teeth");
bindSlider("outerRadius","outerRadius");
bindSlider("toothDepth","toothDepth");
bindSlider("pcbRadius","pcbRadius");

///////////////////////////////////////////////////////////
// NODE BINDINGS
///////////////////////////////////////////////////////////

document
.getElementById("nodeTeeth")
.addEventListener("input",(e)=>{

    params.teeth = parseInt(e.target.value);

    buildGear();

});

document
.getElementById("nodePCBRadius")
.addEventListener("input",(e)=>{

    params.pcbRadius = parseFloat(e.target.value);

    buildPCB();
});

///////////////////////////////////////////////////////////
// BUILD
///////////////////////////////////////////////////////////

buildGear();
buildPCB();
buildMotorHousing();

///////////////////////////////////////////////////////////
// ANIMATION
///////////////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(animate);

    controls.update();
    if(gear){
        gear.rotation.z += 0.01;
    }

    renderer.render(scene,camera);
}

animate();

///////////////////////////////////////////////////////////
// RESIZE
///////////////////////////////////////////////////////////

window.addEventListener("resize",()=>{

    camera.aspect =
        viewport.clientWidth /
        viewport.clientHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        viewport.clientWidth,
        viewport.clientHeight
    );

});

</script>

</body>
</html>
